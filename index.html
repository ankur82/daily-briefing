  <div class="theme"><div class="num">2</div><div><div class="t-title">Brent settles $110.50 &mdash; Hormuz risk premium persists but peaks (for now)</div><div class="t-body">After spiking to $114.60 intraday &mdash; highest since June 2022 &mdash; Brent crude ended April 30 at $110.50 as reports of back-channel diplomatic activity between Washington and Tehran eased the session&apos;s worst fears. Still +62% above pre-war $68/bbl. Every $10 Brent rise adds ~50bps to India&apos;s current account deficit. A genuine ceasefire could cut $15&ndash;20 in days; further Hormuz disruption raises India&apos;s stagflation risk materially.</div></div></div>
  <div class="theme"><div class="num">3</div><div><div class="t-title">Gold surges $102/oz to $4,654 &mdash; safe-haven + month-end rally</div><div class="t-body">Gold reversed sharply on April 30, posting its strongest single-session gain in weeks. Dollar weakness (DXY down 1.87% in April), continued central bank accumulation, and geopolitical risk kept the metal well bid. At $4,654, gold is +31% YTD and sustaining its longest stretch above $4,500 on record. Profit-taking risk is real near-term, but structurally the outlook remains positive as long as oil/geopolitics stay elevated.</div></div></div>
  <div class="theme"><div class="num">4</div><div><div class="t-title">Q4 FY26 earnings peak week &mdash; banks under the microscope</div><div class="t-body">India&apos;s Q4 results season hits its busiest stretch the week of May 4. Bank Nifty fell 1.49% on April 30 &mdash; markets will scrutinise slippage ratios, NIM trajectories, and loan growth guidance closely. FMCG and industrials face margin pressure from high input costs. Nifty Midcap (P/E ~36x) remains vulnerable to any earnings disappointments.</div></div></div>
  <div class="theme"><div class="num">5</div><div><div class="t-title">IMD monsoon forecast due imminently &mdash; single biggest domestic catalyst of May</div><div class="t-body">IMD&apos;s advance forecast for Southwest Monsoon 2026 is expected in the first week of May. A below-normal forecast would stoke food inflation fears, widen fiscal deficit projections, and definitively shut the RBI&apos;s rate-cut window for all of H1 FY27. A normal or above-normal forecast provides meaningful relief. Rural consumption, agri-input, and FMCG stocks will be first movers on the announcement.</div></div></div>
